  ### 1. Course & User Management Function ###
  CourseFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../lambdas/course/
      Handler: index.handler
      Environment:
        Variables:
          SES_SENDER: "saeetarde@gmail.com"
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:PutItem
                - dynamodb:GetItem
                - dynamodb:Scan
                - dynamodb:UpdateItem
                - dynamodb:Query
                - dynamodb:BatchWriteItem
              Resource:
                - !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/courses"
                - !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/users"
                - !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/completions"
                - !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/quiz_answers"
            - Effect: Allow
              Action:
                - ses:SendEmail
                - ses:SendRawEmail
              Resource: "*"
      Events:
        CreateCourse:
          Type: Api
          Properties:
            RestApiId: !Ref LMSApi
            Path: /courses
            Method: post
            RestApiId: !Ref LmsApi
        ListCourses:
          Type: Api
          Properties:
            RestApiId: !Ref LMSApi
            Path: /courses
            Method: get
            RestApiId: !Ref LmsApi
        AssignCourse:
          Type: Api
          Properties:
            RestApiId: !Ref LMSApi
            Path: /courses/{id}/assign
            Method: post
            RestApiId: !Ref LmsApi

  ### 2. Quiz & Grading Function ###
  QuizFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../lambdas/quiz/
      Handler: index.handler
      Environment:
        Variables:
          CERTIFICATE_FUNCTION_NAME: !Ref CertificateFunction
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - dynamodb:Query
                - dynamodb:GetItem
                - dynamodb:UpdateItem
              Resource:
                - !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/quiz_answers"
                - !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/completions"
            - Effect: Allow
              Action:
                - lambda:InvokeFunction
              Resource: !GetAtt CertificateFunction.Arn
      Events:
        GetQuiz:
          Type: Api
          Properties:
            RestApiId: !Ref LMSApi
            Path: /courses/{id}/quiz
            Method: get
            RestApiId: !Ref LmsApi
        SubmitQuiz:
          Type: Api
          Properties:
            RestApiId: !Ref LMSApi
            Path: /courses/{id}/quiz/submit
            Method: post
            RestApiId: !Ref LmsApi

  ### 3. Certificate Generation Function ###
  CertificateFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../lambdas/certificate/
      Handler: index.handler
      Environment:
        Variables:
          CERT_BUCKET: !Ref CertificatesBucket
          SES_SENDER: "saeetarde@gmail.com"
      Policies:
        - S3WritePolicy:
            BucketName: !Ref CertificatesBucket
        - SESCrudPolicy:
            IdentityName: "*"
        - DynamoDBCrudPolicy:
            TableName: certificates
        - DynamoDBReadPolicy:
            TableName: users
        - DynamoDBReadPolicy:
            TableName: courses

  ### 4. Storage & Database Resources ###
  CertificatesBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256

  CertificatesTable:
    Type: AWS::Serverless::SimpleTable
    Properties:
      TableName: certificates
      PrimaryKey:
        Name: cert_id
        Type: String

  VerifyFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../lambdas/verify/
      Handler: index.handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: certificates
        - DynamoDBReadPolicy:
            TableName: users
        - DynamoDBReadPolicy:
            TableName: courses
      Events:
        VerifyCert:
          Type: Api
          Properties:
            RestApiId: !Ref LMSApi
            Path: /verify/{id}
            Method: get
            RestApiId: !Ref LmsApi

  NotifyFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../lambdas/notify/
      Handler: index.handler
      Environment:
        Variables:
          SNS_TOPIC_ARN: "arn:aws:sns:ap-south-1:169415370420:LMS-Overdue-Alerts"
      Policies:
        - DynamoDBReadPolicy:
            TableName: completions
        - SNSPublishMessagePolicy:
            TopicName: "LMS-Overdue-Alerts"
      Events:
        DailyCheck:
          Type: Schedule
          Properties:
            Schedule: "rate(1 day)"

  DashboardFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ../lambdas/dashboard/
      Handler: index.handler
      Environment:
        Variables:
          CERT_BUCKET: !Ref CertificatesBucket
      Policies:
        - DynamoDBReadPolicy: { TableName: "users" }
        - DynamoDBReadPolicy: { TableName: "courses" }
        - DynamoDBReadPolicy: { TableName: "completions" }
        - DynamoDBReadPolicy: { TableName: "certificates" }
      Events:
        GetDashboard:
          Type: Api
          Properties:
            RestApiId: !Ref LMSApi
            Path: /employees/{id}/dashboard
            Method: get
            RestApiId: !Ref LmsApi

Outputs:
